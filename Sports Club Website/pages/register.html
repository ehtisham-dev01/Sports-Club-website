<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sports Club - Register</title>
    <link rel="stylesheet" href="../cssFile/globalStyles.css">
</head>
<body>
    <nav>
        <a href="../index.html">
            <span>⚽ Sports Club</span>
        </a>
        <button class="menu-toggle">&#9776;</button>
        <ul>
            <li><a href="../index.html">Home</a></li>
            <li><a href="services.html">Services</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="login.html" class="link-button">Login</a></li>
            <li><a href="register.html">Register</a></li>
        </ul>
    </nav>

    <main class="page">
        <div class="form-container">
            <h2>Create Account</h2>
            <p>Register to join Sports Club and access all features.</p>

            <form>
                <div>
                    <label for="name">Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div>
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>

                <div>
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Create password" required>
                </div>

                <div>
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="lg-button" style="width: 100%;">
                    Register
                </button>
            </form>

            <p style="text-align: center; margin-top: 20px;">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <div>
                <h1>Sports Club</h1>
            </div>

            <div>
                <h2>Quick Links</h2>
                <a href="../index.html">Home</a>
                <a href="services.html">Services</a>
            </div>
        </div>

        <p>&copy; 2026 Sports Club. All rights reserved.</p>
    </footer>

    <script src="../jsFile/jsFunctions.js"></script>
</body>
</html>
